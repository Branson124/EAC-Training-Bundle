<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAC App Hub</title>
  <meta name="eac-supabase-url" content="https://yubjuraosaprzeqmwhwr.supabase.co"/>
  <meta name="eac-supabase-anon-key" content="sb_publishable_hMtB8wZak_11-JRNwBjh2Q_VlKBSG23"/>
  <script src="/apps/eac-crm/vendor/supabase.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111827;
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ── Login gate ── */
    .login-gate {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%; max-width: 380px;
      text-align: center;
    }
    .login-box h1 {
      font-size: 18px; font-weight: 800;
      margin-bottom: 4px;
    }
    .login-box .subtitle {
      font-size: 12px; color: var(--muted);
      margin-bottom: 20px;
    }
    .login-box label {
      display: block; text-align: left;
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 5px; margin-top: 12px;
    }
    .login-box input {
      width: 100%;
      background: rgba(18,28,52,0.9);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      font-family: inherit;
    }
    .login-box .login-btn {
      width: 100%; margin-top: 18px;
      padding: 12px;
      border-radius: 10px; border: none;
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit;
    }
    .login-box .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-box .toggle-link {
      display: inline-block; margin-top: 14px;
      font-size: 12px; color: var(--accent);
      cursor: pointer; border: none; background: none;
      font-family: inherit; text-decoration: underline;
    }
    .login-msg {
      font-size: 12px; margin-top: 12px;
      min-height: 1.4em; line-height: 1.4;
    }
    .login-msg.err { color: #f87171; }
    .login-msg.ok { color: #4ade80; }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 14px 0;
    }
    .header-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
    .user-bar {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted);
    }
    .user-bar strong { color: var(--text); }
    .user-bar button {
      padding: 5px 10px; border-radius: 6px; font-size: 10px;
      font-weight: 700; cursor: pointer; font-family: inherit;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted);
    }
    .tabs {
      display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 10px;
    }
    .tab {
      appearance: none;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px; font-weight: 600;
      padding: 8px 12px; border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: var(--text); border-color: rgba(148,163,184,0.45); }
    .tab[aria-selected="true"] {
      color: var(--accent);
      border-color: rgba(56,189,248,0.45);
      background: var(--accent-dim);
    }

    /* ── Panels ── */
    main { position: relative; min-height: 0; min-height: min(70vh, calc(100dvh - 160px)); }
    .panel { position: absolute; inset: 0; display: none; }
    .panel.active { display: block; }
    .panel iframe {
      display: block; width: 100%; height: 100%;
      min-height: min(65vh, calc(100dvh - 180px));
      border: 0; background: #0f172a;
    }
  </style>
</head>
<body>

  <!-- Login gate — covers entire page until authenticated -->
  <div class="login-gate" id="login-gate">
    <div class="login-box">
      <h1>Energy Advocate Carolinas</h1>
      <p class="subtitle">Sign in to access all tools</p>

      <div id="login-fields">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" autocomplete="email"/>
        <label for="login-pw">Password</label>
        <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password"/>
        <button type="button" class="login-btn" id="login-btn">Sign In</button>
        <button type="button" class="toggle-link" id="toggle-signup">First time? Create account</button>
      </div>

      <div id="signup-fields" style="display:none">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@company.com" autocomplete="email"/>
        <label for="signup-pw">Create password</label>
        <input type="password" id="signup-pw" placeholder="6+ characters" autocomplete="new-password"/>
        <button type="button" class="login-btn" id="signup-btn">Create Account</button>
        <button type="button" class="toggle-link" id="toggle-login">Already have an account? Sign in</button>
      </div>

      <div class="login-msg" id="login-msg"></div>
    </div>
  </div>

  <!-- App (hidden behind gate until signed in) -->
  <header id="app-header" style="display:none">
    <div class="header-top">
      <h1>Energy Advocate Carolinas — App Hub</h1>
      <div class="user-bar">
        <span>Signed in as <strong id="user-email"></strong></span>
        <button type="button" id="signout-btn">Sign out</button>
      </div>
    </div>
    <div class="tabs" role="tablist" aria-label="EAC applications">
      <button type="button" class="tab" role="tab" id="tab-sales" aria-selected="false" data-target="sales">Door Setter</button>
      <button type="button" class="tab" role="tab" id="tab-cc" aria-selected="false" data-target="cc">Command Center</button>
      <button type="button" class="tab" role="tab" id="tab-hep" aria-selected="false" data-target="hep">Home Efficiency</button>
      <button type="button" class="tab" role="tab" id="tab-crm" aria-selected="false" data-target="crm">EAC CRM</button>
      <button type="button" class="tab" role="tab" id="tab-mj" aria-selected="false" data-target="mj">Manual J</button>
      <button type="button" class="tab" role="tab" id="tab-home-docs" aria-selected="false" data-target="home-docs">Client Home Docs</button>
    </div>
  </header>

  <main id="app-main" style="display:none">
    <section class="panel" id="panel-sales" role="tabpanel" aria-labelledby="tab-sales">
      <iframe title="Door Setter" data-src="/apps/sales-rep/"></iframe>
    </section>
    <section class="panel" id="panel-cc" role="tabpanel" aria-labelledby="tab-cc">
      <iframe title="EAC Command Center" data-src="/apps/eac-command-center/index.html"></iframe>
    </section>
    <section class="panel" id="panel-hep" role="tabpanel" aria-labelledby="tab-hep">
      <iframe title="Home Efficiency Program" data-src="/apps/home-efficiency/"></iframe>
    </section>
    <section class="panel" id="panel-crm" role="tabpanel" aria-labelledby="tab-crm">
      <iframe title="EAC Client Tracker" data-src="/apps/eac-crm/index.html"></iframe>
    </section>
    <section class="panel" id="panel-mj" role="tabpanel" aria-labelledby="tab-mj">
      <iframe title="Manual J Load Calculator" data-src="/apps/manual-j-calculator/index.html"></iframe>
    </section>
    <section class="panel" id="panel-home-docs" role="tabpanel" aria-labelledby="tab-home-docs">
      <iframe title="Client home documentation" data-src="/apps/sales-rep/client-home-docs.html"></iframe>
    </section>
  </main>

  <script>
    (function () {
      /* ── Supabase init ── */
      var sbUrl = (document.querySelector('meta[name="eac-supabase-url"]') || {}).content || "";
      var sbKey = (document.querySelector('meta[name="eac-supabase-anon-key"]') || {}).content || "";
      var sb = (sbUrl && sbKey && window.supabase && window.supabase.createClient)
        ? window.supabase.createClient(sbUrl, sbKey)
        : null;

      /* ── DOM refs ── */
      var gate      = document.getElementById("login-gate");
      var header    = document.getElementById("app-header");
      var mainEl    = document.getElementById("app-main");
      var msgEl     = document.getElementById("login-msg");
      var userEmail = document.getElementById("user-email");

      var loginFields  = document.getElementById("login-fields");
      var signupFields = document.getElementById("signup-fields");
      var loginBtn     = document.getElementById("login-btn");
      var signupBtn    = document.getElementById("signup-btn");
      var signoutBtn   = document.getElementById("signout-btn");

      /* ── Toggle login / signup ── */
      document.getElementById("toggle-signup").addEventListener("click", function () {
        loginFields.style.display = "none";
        signupFields.style.display = "";
        msgEl.textContent = "";
        msgEl.className = "login-msg";
      });
      document.getElementById("toggle-login").addEventListener("click", function () {
        signupFields.style.display = "none";
        loginFields.style.display = "";
        msgEl.textContent = "";
        msgEl.className = "login-msg";
      });

      /* ── Show / hide gate ── */
      function unlock(session) {
        gate.style.display = "none";
        header.style.display = "";
        mainEl.style.display = "";
        userEmail.textContent = session.user.email || "user";
      }

      function lock() {
        gate.style.display = "";
        header.style.display = "none";
        mainEl.style.display = "none";
        userEmail.textContent = "";
        msgEl.textContent = "";
        msgEl.className = "login-msg";
      }

      /* ── Tab switching ── */
      var tabMap = {
        sales: { panel: document.getElementById("panel-sales"), tab: document.getElementById("tab-sales") },
        cc:    { panel: document.getElementById("panel-cc"),    tab: document.getElementById("tab-cc") },
        hep:   { panel: document.getElementById("panel-hep"),   tab: document.getElementById("tab-hep") },
        crm:   { panel: document.getElementById("panel-crm"),   tab: document.getElementById("tab-crm") },
        mj:    { panel: document.getElementById("panel-mj"),    tab: document.getElementById("tab-mj") },
        "home-docs": { panel: document.getElementById("panel-home-docs"), tab: document.getElementById("tab-home-docs") },
      };

      function activate(key) {
        Object.keys(tabMap).forEach(function (k) {
          var p = tabMap[k].panel, t = tabMap[k].tab, on = k === key;
          t.setAttribute("aria-selected", on ? "true" : "false");
          p.classList.toggle("active", on);
          if (on) {
            var iframe = p.querySelector("iframe");
            if (iframe && !iframe.getAttribute("src")) {
              iframe.setAttribute("src", iframe.getAttribute("data-src"));
            }
          }
        });
      }
      document.querySelectorAll(".tab").forEach(function (btn) {
        btn.addEventListener("click", function () { activate(btn.getAttribute("data-target")); });
      });

      if (!sb) {
        msgEl.textContent = "Supabase not loaded.";
        msgEl.className = "login-msg err";
        loginBtn.disabled = true;
        signupBtn.disabled = true;
        return;
      }

      /* ── Check existing session on page load ── */
      sb.auth.getSession().then(function (r) {
        if (r.data.session) { unlock(r.data.session); activate("sales"); }
      });
      sb.auth.onAuthStateChange(function (_e, sess) {
        if (sess) { unlock(sess); activate("sales"); }
        else lock();
      });

      /* ── Sign in with email + password ── */
      loginBtn.addEventListener("click", function () {
        var email = (document.getElementById("login-email").value || "").trim();
        var pw    = (document.getElementById("login-pw").value || "");
        if (!email || !pw) { msgEl.textContent = "Enter email and password."; msgEl.className = "login-msg err"; return; }
        loginBtn.disabled = true;
        msgEl.textContent = "Signing in...";
        msgEl.className = "login-msg";
        sb.auth.signInWithPassword({ email: email, password: pw }).then(function (res) {
          loginBtn.disabled = false;
          if (res.error) { msgEl.textContent = res.error.message; msgEl.className = "login-msg err"; }
        });
      });

      /* ── Sign up (create account) ── */
      signupBtn.addEventListener("click", function () {
        var email = (document.getElementById("signup-email").value || "").trim();
        var pw    = (document.getElementById("signup-pw").value || "");
        if (!email || !pw) { msgEl.textContent = "Enter email and password."; msgEl.className = "login-msg err"; return; }
        if (pw.length < 6) { msgEl.textContent = "Password must be at least 6 characters."; msgEl.className = "login-msg err"; return; }
        signupBtn.disabled = true;
        msgEl.textContent = "Creating account...";
        msgEl.className = "login-msg";
        sb.auth.signUp({ email: email, password: pw }).then(function (res) {
          signupBtn.disabled = false;
          if (res.error) { msgEl.textContent = res.error.message; msgEl.className = "login-msg err"; }
          else if (res.data.user && !res.data.session) {
            msgEl.textContent = "Check your email to confirm your account, then sign in.";
            msgEl.className = "login-msg ok";
          }
        });
      });

      /* ── Sign out ── */
      signoutBtn.addEventListener("click", function () {
        sb.auth.signOut().then(function () { lock(); });
      });

      /* ── Enter key submits ── */
      document.getElementById("login-pw").addEventListener("keydown", function (e) {
        if (e.key === "Enter") loginBtn.click();
      });
      document.getElementById("signup-pw").addEventListener("keydown", function (e) {
        if (e.key === "Enter") signupBtn.click();
      });
    })();
  </script>
</body>
</html>
