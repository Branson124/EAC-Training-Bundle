<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EAC App Hub</title>
  <meta name="eac-supabase-url" content="https://yubjuraosaprzeqmwhwr.supabase.co"/>
  <meta name="eac-supabase-anon-key" content="sb_publishable_hMtB8wZak_11-JRNwBjh2Q_VlKBSG23"/>
  <script src="/apps/eac-crm/vendor/supabase.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #111827;
      --border: rgba(148, 163, 184, 0.2);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      height: 100%;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 14px 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }
    header p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      max-width: 720px;
      line-height: 1.45;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding-bottom: 10px;
    }
    .tab {
      appearance: none;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tab:hover {
      color: var(--text);
      border-color: rgba(148, 163, 184, 0.45);
    }
    .tab[aria-selected="true"] {
      color: var(--accent);
      border-color: rgba(56, 189, 248, 0.45);
      background: var(--accent-dim);
    }
    main {
      position: relative;
      min-height: 0;
      /* Fallback if grid height is ever wrong on older browsers */
      min-height: min(70vh, calc(100dvh - 160px));
    }
    .panel {
      position: absolute;
      inset: 0;
      display: none;
    }
    .panel.active {
      display: block;
    }
    .panel iframe {
      display: block;
      width: 100%;
      height: 100%;
      min-height: min(65vh, calc(100dvh - 180px));
      border: 0;
      background: #0f172a;
    }
    .auth-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 0 10px;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }
    .auth-bar input[type=email] {
      background: rgba(18,28,52,0.9);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      width: 220px;
      font-family: inherit;
    }
    .auth-btn {
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      border: none;
      background: linear-gradient(135deg, #0284c7, #0ea5e9);
      color: #fff;
    }
    .auth-btn.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .auth-status {
      font-size: 11px;
      color: var(--muted);
    }
    .auth-status strong {
      color: var(--text);
    }
    .auth-msg {
      font-size: 11px;
      color: var(--accent);
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Energy Advocate Carolinas — App Hub</h1>
    <p>
      Sign in once below — all tabs (CRM, Door Setter, Home Docs, etc.) share the same account and save to the cloud automatically.
    </p>
    <div class="auth-bar" id="auth-bar">
      <div id="auth-form">
        <input type="email" id="auth-email" placeholder="you@company.com" autocomplete="email"/>
        <button type="button" class="auth-btn" id="auth-send">Sign in</button>
      </div>
      <div id="auth-signed" style="display:none">
        <span class="auth-status">Signed in as <strong id="auth-user-email"></strong></span>
        <button type="button" class="auth-btn ghost" id="auth-signout">Sign out</button>
      </div>
      <div class="auth-msg" id="auth-msg"></div>
    </div>
    <div class="tabs" role="tablist" aria-label="EAC applications">
      <button type="button" class="tab" role="tab" id="tab-sales" aria-selected="false" data-target="sales">Door Setter</button>
      <button type="button" class="tab" role="tab" id="tab-cc" aria-selected="false" data-target="cc">Command Center</button>
      <button type="button" class="tab" role="tab" id="tab-hep" aria-selected="false" data-target="hep">Home Efficiency</button>
      <button type="button" class="tab" role="tab" id="tab-crm" aria-selected="false" data-target="crm">EAC CRM</button>
      <button type="button" class="tab" role="tab" id="tab-mj" aria-selected="false" data-target="mj">Manual J</button>
      <button type="button" class="tab" role="tab" id="tab-home-docs" aria-selected="false" data-target="home-docs">Client Home Docs</button>
    </div>
  </header>
  <main>
    <section class="panel" id="panel-sales" role="tabpanel" aria-labelledby="tab-sales">
      <iframe title="Door Setter" data-src="/apps/sales-rep/"></iframe>
    </section>
    <section class="panel" id="panel-cc" role="tabpanel" aria-labelledby="tab-cc">
      <iframe title="EAC Command Center" data-src="/apps/eac-command-center/index.html"></iframe>
    </section>
    <section class="panel" id="panel-hep" role="tabpanel" aria-labelledby="tab-hep">
      <iframe title="NC AMI calculator — Home Efficiency" data-src="/apps/home-efficiency/"></iframe>
    </section>
    <section class="panel" id="panel-crm" role="tabpanel" aria-labelledby="tab-crm">
      <iframe title="EAC Client Tracker" data-src="/apps/eac-crm/index.html"></iframe>
    </section>
    <section class="panel" id="panel-mj" role="tabpanel" aria-labelledby="tab-mj">
      <iframe title="Manual J Load Calculator" data-src="/apps/manual-j-calculator/index.html"></iframe>
    </section>
    <section class="panel" id="panel-home-docs" role="tabpanel" aria-labelledby="tab-home-docs">
      <iframe title="Client home documentation" data-src="/apps/sales-rep/client-home-docs.html"></iframe>
    </section>
  </main>
  <script>
    (function () {
      /* ── Tab switching ── */
      const map = {
        sales: { panel: document.getElementById("panel-sales"), tab: document.getElementById("tab-sales") },
        cc: { panel: document.getElementById("panel-cc"), tab: document.getElementById("tab-cc") },
        hep: { panel: document.getElementById("panel-hep"), tab: document.getElementById("tab-hep") },
        crm: { panel: document.getElementById("panel-crm"), tab: document.getElementById("tab-crm") },
        mj: { panel: document.getElementById("panel-mj"), tab: document.getElementById("tab-mj") },
        "home-docs": { panel: document.getElementById("panel-home-docs"), tab: document.getElementById("tab-home-docs") },
      };

      function activate(key) {
        Object.keys(map).forEach((k) => {
          const { panel, tab } = map[k];
          const on = k === key;
          tab.setAttribute("aria-selected", on ? "true" : "false");
          panel.classList.toggle("active", on);
          if (on) {
            const iframe = panel.querySelector("iframe");
            if (iframe && !iframe.getAttribute("src")) {
              iframe.setAttribute("src", iframe.getAttribute("data-src"));
            }
          }
        });
      }

      document.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => activate(btn.getAttribute("data-target")));
      });

      activate("sales");

      /* ── Supabase auth (hub level) ── */
      var sbUrl = (document.querySelector('meta[name="eac-supabase-url"]') || {}).content || "";
      var sbKey = (document.querySelector('meta[name="eac-supabase-anon-key"]') || {}).content || "";
      var sb = null;

      if (sbUrl && sbKey && window.supabase && window.supabase.createClient) {
        sb = window.supabase.createClient(sbUrl, sbKey);
      }

      var formEl   = document.getElementById("auth-form");
      var signedEl = document.getElementById("auth-signed");
      var emailEl  = document.getElementById("auth-user-email");
      var msgEl    = document.getElementById("auth-msg");
      var sendBtn  = document.getElementById("auth-send");
      var outBtn   = document.getElementById("auth-signout");
      var inp      = document.getElementById("auth-email");

      function showAuth(session) {
        if (session && session.user) {
          formEl.style.display = "none";
          signedEl.style.display = "";
          emailEl.textContent = session.user.email || "Signed in";
          msgEl.textContent = "";
        } else {
          formEl.style.display = "";
          signedEl.style.display = "none";
          emailEl.textContent = "";
        }
      }

      if (sb) {
        sb.auth.getSession().then(function (r) { showAuth(r.data.session); });
        sb.auth.onAuthStateChange(function (_e, sess) { showAuth(sess); });

        sendBtn.addEventListener("click", function () {
          var email = (inp.value || "").trim();
          if (!email) { msgEl.textContent = "Enter your email."; return; }
          msgEl.textContent = "Sending...";
          sb.auth.signInWithOtp({
            email: email,
            options: { emailRedirectTo: window.location.origin + "/" }
          }).then(function (res) {
            if (res.error) msgEl.textContent = res.error.message;
            else msgEl.textContent = "Check your email for the sign-in link.";
          });
        });

        outBtn.addEventListener("click", function () {
          sb.auth.signOut().then(function () {
            showAuth(null);
            document.querySelectorAll("iframe[src]").forEach(function (f) {
              f.contentWindow.location.reload();
            });
          });
        });
      } else {
        msgEl.textContent = "Supabase not loaded — sign-in unavailable.";
        sendBtn.disabled = true;
      }
    })();
  </script>
</body>
</html>
